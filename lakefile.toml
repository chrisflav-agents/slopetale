name = "proetale"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Proetale"]

# Pass leanOptions to `lake serve` (for LSP / MCP tools).
# `lake serve` does NOT inherit [leanOptions] automatically;
# it only reads moreServerArgs as raw CLI flags.
moreServerArgs = ["-Dbackward.isDefEq.respectTransparency=false"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
backward.isDefEq.respectTransparency = false
weak.linter.mathlibStandardSet = true
weak.linter.style.header = false
# Switch off warnings generated by `sorry`
warn.sorry = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "2715441e33488d07daed17f53319dd363a9b744f"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "upstreamer"
git = "https://github.com/chrisflav/upstreamer"
rev = "f0cd4b14367ecd61b3e15e8269a287ea405365bb"

[[lean_lib]]
name = "Proetale"
